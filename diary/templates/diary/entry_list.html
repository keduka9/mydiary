<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日記一覧</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1>📔 私の日記</h1>
            <div>
                <a href="{% url 'entry_new' %}" class=""btn btn-success>新しい日記を書く</a>
                <form method="post" action="{% url 'logout' %}" style="display:inline;">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-outline-secondary">ログアウト</button>
                </form>
            </div>
        </div>
        {% if entries %}
            {% for entry in entries %}
                <div class="card mb-3 shadow-sm">
                    <div class="card-body">
                        <div class="d-flex justify-content-between">
                            <h5 class="card-title">{{ entry.get_mood_display }} {{ entry.title }}</h5>
                            <span class="text-muted">{{ entry.date }}</span>
                        </div>
                        <p class="card-text text-muted">{{ entry.content|truncatechars:80 }}</p>
                        <a href="{% url 'entry_detail' entry.pk %}" class="btn btn-primary btn-sm">続きを読む</a>
                    </div>
                </div>
            {% endfor %}
        {% else %}
            <div class="text-center mt-5">
                <p class="text-muted">まだ日記がありません。最初の日記を書いてみましょう！</p>
                <a href="{% url 'entry_new' %}" class="btn btn-success">日記を書く</a>
            </div>
        {% endif %}
    </div>
</body>
</html>
