<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ entry.title }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow p-4">
            <div class="d-flex fustify-content-between align-items-center mb-3">
                <h1>{{ entry.get_mood_display }} {{ entry.title }}</h1>
                <span class="test-muted">{{ entry.date }}</span>
            </div>
            <hr>
            <p style="white-space: pre-wrap;">{{ entry.content }}</p>
            <div class="mt-4">
                <a href="{% url 'entry_edit' entry.pk %}" class="btn btn-warning">編集する</a>
                <a href="{% url 'entry_delete' entry.pk %}" class="btn btn-danger">削除する</a>
                <a href="{% url 'entry_list' %}" class="btn btn-outline-secondary">一覧に戻る</a>
            </div>
        </div>
    </div>
</body>
</html>
